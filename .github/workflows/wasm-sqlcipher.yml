name: wasm-sqlcipher

on:
  push:
    branches: [main, y8-reactive]
    paths:
      - 'wasm/**'
      - 'vendor/sqlcipher'
      - '.github/workflows/wasm-sqlcipher.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y tcl cmake automake autoconf libtool

      - name: Build LibreSSL (for SQLCipher crypto)
        run: |
          cd vendor/libressl
          ./autogen.sh
          mkdir -p build && cd build
          cmake .. -DCMAKE_INSTALL_PREFIX=/usr/local \
            -DLIBRESSL_APPS=OFF -DLIBRESSL_TESTS=OFF -DBUILD_SHARED_LIBS=OFF
          make -j$(nproc)
          sudo make install
          echo "=== LibreSSL installed ==="
          ls /usr/local/lib/libssl.a /usr/local/lib/libcrypto.a

      - name: Build SQLCipher amalgamation
        run: |
          cd vendor/sqlcipher
          ./configure --with-tempstore=yes \
            CFLAGS="-DSQLITE_HAS_CODEC -DSQLCIPHER_CRYPTO_OPENSSL -I/usr/local/include" \
            LDFLAGS="-L/usr/local/lib -lssl -lcrypto"
          make sqlite3.c
          echo "=== Amalgamation ==="
          ls -lh sqlite3.c sqlite3.h
          head -5 sqlite3.c

      - name: Install Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.74

      - name: Compile SQLCipher to WASM
        run: |
          mkdir -p wasm/build
          cp vendor/sqlcipher/sqlite3.c wasm/build/
          cp vendor/sqlcipher/sqlite3.h wasm/build/
          cp wasm/wyatt_wasm.c wasm/build/

          cat >> wasm/build/wyatt_wasm.c <<'KEYEOF'
          int wasm_db_key(sqlite3 *db, const char *key, int key_len) {
              return sqlite3_key(db, key, key_len);
          }
          KEYEOF

          EXPORTED='["_wasm_db_open","_wasm_db_close","_wasm_db_exec","_wasm_db_errmsg","_wasm_db_key","_wasm_db_prepare","_wasm_stmt_finalize","_wasm_stmt_reset","_wasm_stmt_step","_wasm_stmt_run","_wasm_stmt_bind_text","_wasm_stmt_bind_int","_wasm_stmt_bind_double","_wasm_stmt_bind_null","_wasm_stmt_columns","_wasm_stmt_colname","_wasm_stmt_coltype","_wasm_stmt_int","_wasm_stmt_double","_wasm_stmt_text","_malloc","_free"]'
          RUNTIME='["cwrap","UTF8ToString","stringToUTF8","lengthBytesUTF8"]'

          cd wasm/build
          emcc wyatt_wasm.c \
            -I. -I/usr/local/include \
            -O2 \
            -DSQLITE_HAS_CODEC \
            -DSQLCIPHER_CRYPTO_OPENSSL \
            -DSQLITE_EXTRA_INIT=sqlcipher_extra_init \
            -DSQLITE_EXTRA_SHUTDOWN=sqlcipher_extra_shutdown \
            -DSQLITE_OMIT_LOAD_EXTENSION \
            -DSQLITE_THREADSAFE=0 \
            -DSQLITE_ENABLE_FTS5 \
            -DSQLITE_ENABLE_JSON1 \
            -s WASM=1 \
            -s EXPORTED_FUNCTIONS="$EXPORTED" \
            -s EXPORTED_RUNTIME_METHODS="$RUNTIME" \
            -s ALLOW_MEMORY_GROWTH=1 \
            -s INITIAL_MEMORY=16777216 \
            -s MODULARIZE=1 \
            -s EXPORT_NAME="initSqlcipher" \
            -s ENVIRONMENT='web,worker,node' \
            -s FILESYSTEM=0 \
            -o sqlcipher.js

          echo "=== Output ==="
          ls -lh sqlcipher.js sqlcipher.wasm

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sqlcipher-wasm
          path: |
            wasm/build/sqlcipher.js
            wasm/build/sqlcipher.wasm
          retention-days: 90
